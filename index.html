<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at center, #0b0c2a, #000);
  color: white;
  overflow: hidden;
}

.title {
  text-align: center;
  margin-top: 30px;
  font-size: 22px;
  opacity: 0.8;
}

.stars {
  position: relative;
  width: 100%;
  height: 100vh;
}

.star {
  position: absolute;
  cursor: pointer;
  font-size: 18px;
  opacity: 0.4;
  transition: 0.3s;
}

.star:hover {
  transform: scale(1.5);
  opacity: 1;
}

.star.opened {
  color: #ffb6d9;
  opacity: 1;
  text-shadow: 0 0 12px #ffb6d9;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.popup-box {
  background: rgba(20,20,40,0.95);
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
}

#close {
  float: right;
  cursor: pointer;
}

/* final message */
#final {
  position: fixed;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 26px;
  color: #ffb6d9;
  text-shadow: 0 0 15px #ffb6d9;
}

/* music button */
#music-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 10;
}
</style>
</head>

<body>

<h2 class="title">a journey written in stars</h2>

<button id="music-btn">🔊</button>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="stars">

<!-- 10 stars -->
<div class="star" data-id="0" style="top:10%; left:50%;">✦</div>
<div class="star" data-id="1" style="top:20%; left:70%;">✦</div>
<div class="star" data-id="2" style="top:35%; left:85%;">✦</div>
<div class="star" data-id="3" style="top:55%; left:80%;">✦</div>
<div class="star" data-id="4" style="top:70%; left:65%;">✦</div>
<div class="star" data-id="5" style="top:80%; left:50%;">✦</div>
<div class="star" data-id="6" style="top:70%; left:35%;">✦</div>
<div class="star" data-id="7" style="top:55%; left:20%;">✦</div>
<div class="star" data-id="8" style="top:35%; left:15%;">✦</div>
<div class="star" data-id="9" style="top:20%; left:30%;">✦</div>

</div>

<!-- popup -->
<div id="popup" class="hidden">
  <div class="popup-box">
    <span id="close">✕</span>
    <h3 id="title"></h3>
    <p id="text"></p>
  </div>
</div>

<!-- final message -->
<div id="final" class="hidden">
  now you see it.<br>this was always us.
</div>

<script>
const stars = document.querySelectorAll(".star");
const popup = document.getElementById("popup");
const title = document.getElementById("title");
const text = document.getElementById("text");
const closeBtn = document.getElementById("close");
const final = document.getElementById("final");

let opened = [];

const letters = [
  {title:"Open when you miss me", text:"Even when I’m not there, I’m with you in quiet ways."},
  {title:"Open when you think of how we started", text:"We had no idea how far we’d come."},
  {title:"Open when we fight", text:"We may fall apart sometimes, but we always come back."},
  {title:"Open when you feel I don’t understand you", text:"I may fail sometimes, but I’m always trying."},
  {title:"Open when you feel lost", text:"You’ve always found your way."},
  {title:"Open when you feel like giving up", text:"You’re stronger than this moment."},
  {title:"Open when you doubt yourself", text:"I see things in you that you don’t."},
  {title:"Open when you achieve something big", text:"I’m proud of you. Always."},
  {title:"Open when you think about us long term", text:"What we have is real."},
  {title:"Open when you read this years later", text:"If you’re here, it meant something."}
];

// STAR CLICK
stars.forEach((star, index) => {
  star.addEventListener("click", () => {
    title.innerText = letters[index].title;
    text.innerText = letters[index].text;

    popup.classList.remove("hidden");

    if (!opened.includes(index)) {
      opened.push(index);
      star.classList.add("opened");
    }

    if (opened.length === stars.length) {
      setTimeout(() => {
        final.classList.remove("hidden");
      }, 800);
    }
  });
});

// CLOSE POPUP
closeBtn.addEventListener("click", () => {
  popup.classList.add("hidden");
});
</script>

</body>
</html>
