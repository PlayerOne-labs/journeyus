<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #0b0c2a, #000);
  color: white;
  font-family: sans-serif;
  overflow: hidden;
}

h2 {
  text-align: center;
  margin-top: 20px;
  opacity: 0.8;
}

.star {
  position: absolute;
  cursor: pointer;
  font-size: 18px;
  opacity: 0.5;
  transition: 0.3s;
}

.star:hover {
  transform: scale(1.5);
  opacity: 1;
}

.star.opened {
  color: #ffb6d9;
  text-shadow: 0 0 10px #ffb6d9;
  opacity: 1;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(20,20,40,0.95);
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
}

#close {
  float: right;
  cursor: pointer;
}

/* final message */
#final {
  position: fixed;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 26px;
  color: #ffb6d9;
  display: none;
}
</style>
</head>

<body>

<h2>a journey written in stars</h2>

<!-- stars -->
<div class="star" style="top:10%; left:50%;">✦</div>
<div class="star" style="top:20%; left:70%;">✦</div>
<div class="star" style="top:35%; left:85%;">✦</div>
<div class="star" style="top:55%; left:80%;">✦</div>
<div class="star" style="top:70%; left:65%;">✦</div>
<div class="star" style="top:80%; left:50%;">✦</div>
<div class="star" style="top:70%; left:35%;">✦</div>
<div class="star" style="top:55%; left:20%;">✦</div>
<div class="star" style="top:35%; left:15%;">✦</div>
<div class="star" style="top:20%; left:30%;">✦</div>

<!-- popup -->
<div id="popup">
  <div class="box">
    <span id="close">✕</span>
    <h3 id="title"></h3>
    <p id="text"></p>
  </div>
</div>

<!-- final -->
<div id="final">
  now you see it.<br>this was always us.
</div>

<script>
window.onload = function () {

  const stars = document.querySelectorAll(".star");
  const popup = document.getElementById("popup");
  const title = document.getElementById("title");
  const text = document.getElementById("text");
  const close = document.getElementById("close");
  const final = document.getElementById("final");

  let opened = [];

  const letters = [
    "Even when I’m not there, I’m with you.",
    "We didn’t know how far we’d come.",
    "We fight, but we always come back.",
    "I may not always understand, but I try.",
    "You’ve always found your way.",
    "You’re stronger than this moment.",
    "I see things in you that you don’t.",
    "I’m proud of you. Always.",
    "What we have is real.",
    "If you’re here, it meant something."
  ];

  stars.forEach((star, index) => {
    star.onclick = function () {

      title.innerText = "Open when...";
      text.innerText = letters[index];

      popup.style.display = "flex";

      if (!opened.includes(index)) {
        opened.push(index);
        star.classList.add("opened");
      }

      if (opened.length === stars.length) {
        setTimeout(() => {
          final.style.display = "block";
        }, 800);
      }
    };
  });

  close.onclick = function () {
    popup.style.display = "none";
  };

};
</script>

</body>
</html>
