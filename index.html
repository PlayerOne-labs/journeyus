<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
  color: white;

  background:
    radial-gradient(circle at 30% 40%, rgba(255, 0, 150, 0.08), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0, 150, 255, 0.08), transparent 40%),
    radial-gradient(circle at center, #0b0c2a, #000);
}

h2 {
  text-align: center;
  margin-top: 20px;
  opacity: 0.8;
}

/* galaxy stars */
#galaxy {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

#galaxy span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 4s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* constellation */
#constellation {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 320px;
  height: 320px;
  transform: translate(-50%, -50%);
}

.star {
  position: absolute;
  cursor: pointer;
  font-size: 18px;
  opacity: 0.6;
  transition: 0.3s;
}

.star:hover {
  transform: scale(1.5);
  opacity: 1;
}

.star.opened {
  color: #ff9edb;
  text-shadow: 0 0 10px #ff9edb;
  opacity: 1;
}

/* popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(20,20,40,0.95);
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
}

#close {
  float: right;
  cursor: pointer;
}

/* final text */
#final {
  position: fixed;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 26px;
  color: #ff9edb;
  display: none;
}
</style>
</head>

<body>

<div id="galaxy"></div>

<h2>a journey written in stars</h2>

<div id="constellation">
  <svg id="lines" width="320" height="320" style="position:absolute; top:0; left:0; pointer-events:none;"></svg>
</div>

<div id="popup">
  <div class="box">
    <span id="close">✕</span>
    <h3 id="title">Open when...</h3>
    <p id="text"></p>
  </div>
</div>

<div id="final">
  now you see it.<br>this was always us.
</div>

```html
<script>
window.onload = function () {

  // 🌌 galaxy background
  const galaxy = document.getElementById("galaxy");
  for (let i = 0; i < 120; i++) {
    let star = document.createElement("span");
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    galaxy.appendChild(star);
  }

  const container = document.getElementById("constellation");
  const svg = document.getElementById("lines");

  // clear old stuff (important)
  container.querySelectorAll(".star").forEach(s => s.remove());

  const totalStars = 12;
  let stars = [];

  // ❤️ generate proper heart shape
  for (let i = 0; i < totalStars; i++) {
    let t = (i / totalStars) * Math.PI * 2;

    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

    let posX = 160 + x * 6;
    let posY = 150 - y * 6;

    let star = document.createElement("div");
    star.className = "star";
    star.style.left = posX + "px";
    star.style.top = posY + "px";
    star.innerHTML = "✦";

    container.appendChild(star);
    stars.push(star);
  }

  const popup = document.getElementById("popup");
  const text = document.getElementById("text");
  const close = document.getElementById("close");
  const final = document.getElementById("final");

  let opened = [];

  const letters = [
    "Even when I’m not there, I’m with you.",
    "We didn’t know how far we’d come.",
    "We fight, but we come back.",
    "I may not understand, but I try.",
    "You’ve always found your way.",
    "You’re stronger than this.",
    "I see things in you that you don’t.",
    "I’m proud of you.",
    "What we have is real.",
    "You matter.",
    "We made it this far.",
    "If you're here, it meant something."
  ];

  // ❤️ draw clean heart outline (not random lines)
  function drawHeartOutline(stars) {
    let pathData = "";

    stars.forEach((star, i) => {
      let x = star.offsetLeft + star.offsetWidth / 2;
      let y = star.offsetTop + star.offsetHeight / 2;

      if (i === 0) {
        pathData += `M ${x} ${y}`;
      } else {
        pathData += ` L ${x} ${y}`;
      }
    });

    pathData += " Z";

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    path.setAttribute("d", pathData);
    path.setAttribute("stroke", "#ff9edb");
    path.setAttribute("stroke-width", "2");
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    path.style.filter = "drop-shadow(0 0 10px #ff9edb)";

    svg.appendChild(path);
  }

  // ⭐ click logic
  stars.forEach((star, i) => {
    star.onclick = function () {

      text.innerText = letters[i % letters.length];
      popup.style.display = "flex";

      if (!opened.includes(i)) {
        opened.push(i);
        star.classList.add("opened");
      }

      // ❤️ show heart only when all opened
      if (opened.length === stars.length) {
        drawHeartOutline(stars);

        setTimeout(() => {
          final.style.display = "block";
        }, 800);
      }
    };
  });

  close.onclick = function () {
    popup.style.display = "none";
  };

};
</script>

</body>
</html>
