<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stars</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
}

.star {
  position: absolute;
  cursor: pointer;
  font-size: 25px;
}

#popup {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 20px;
  display: none;
}

#close {
  cursor: pointer;
  float: right;
}
</style>
</head>

<body>

<h2>Click a star</h2>

<div class="star" style="top:20%; left:40%;">⭐</div>
<div class="star" style="top:40%; left:60%;">⭐</div>
<div class="star" style="top:60%; left:30%;">⭐</div>

<div id="popup">
  <span id="close">X</span>
  <p id="text">Hello</p>
</div>

<script>
window.onload = function () {

  const stars = document.querySelectorAll(".star");
  const popup = document.getElementById("popup");
  const text = document.getElementById("text");
  const close = document.getElementById("close");

  stars.forEach((star, index) => {
    star.onclick = function () {
      text.innerText = "You clicked star " + (index + 1);
      popup.style.display = "block";
    };
  });

  close.onclick = function () {
    popup.style.display = "none";
  };

};
</script>

</body>
</html>
